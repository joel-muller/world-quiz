name: Server Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          architecture: x64

      - name: Build the JAR
        run: mvn clean package

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and tag Docker image
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "Building Docker image for tag $TAG_NAME, commit $COMMIT_SHA"
          docker build -t ghcr.io/${{ github.repository_owner }}/world-quiz-server:${TAG_NAME} .
          docker tag ghcr.io/${{ github.repository_owner }}/world-quiz-server:${TAG_NAME} ghcr.io/${{ github.repository_owner }}/world-quiz-server:${COMMIT_SHA}
          docker tag ghcr.io/${{ github.repository_owner }}/world-quiz-server:${TAG_NAME} ghcr.io/${{ github.repository_owner }}/world-quiz-server:latest

      - name: Push Docker images to GHCR
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          COMMIT_SHA=$(git rev-parse --short HEAD)
          docker push ghcr.io/${{ github.repository_owner }}/world-quiz-server:${TAG_NAME}
          docker push ghcr.io/${{ github.repository_owner }}/world-quiz-server:${COMMIT_SHA}
          docker push ghcr.io/${{ github.repository_owner }}/world-quiz-server:latest
